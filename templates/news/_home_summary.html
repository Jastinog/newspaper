{% load i18n %}
{% if summary %}
<div class="home-sum">
    <div class="home-sum-text">{{ summary.summary|linebreaks }}</div>
    {% if summary.conclusion %}
    <div class="home-sum-concl"><span class="home-sum-label">Вывод</span> {{ summary.conclusion }}</div>
    {% endif %}
</div>
{% elif summary_error %}
<div class="home-sum-error">
    <span>{{ summary_error }}</span>
    <button class="home-sum-btn"
            hx-post="{% url 'article_summarize' article.pk %}" hx-vals='{"compact":"1"}'
            hx-target="#homesum-{{ article.pk }}" hx-swap="innerHTML"
            hx-trigger="click once" hx-disabled-elt="this">Повторить</button>
</div>
{% endif %}
