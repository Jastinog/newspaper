{% load news_extras i18n %}
{% if item.best_image_url %}<div class="item-image-wrap">
    <a href="{% url 'story_detail' item.id %}"><img class="item-image" src="{{ item.best_image_url }}" alt="" loading="lazy"></a>
    <div class="item-top-bar">
        {% sources_panel item %}
        {% include "news/_importance_bar.html" %}
    </div>
</div>{% else %}<div class="item-top-bar item-top-bar--no-image">
    {% sources_panel item %}
    {% include "news/_importance_bar.html" %}
</div>{% endif %}
<a href="{% url 'story_detail' item.id %}" class="item-topic">{{ item.loc_topic }}</a>
<span class="item-summary">{{ item.loc_summary }}</span>
<span class="item-actions">
    <button class="similar-btn" data-item-id="{{ item.id }}" aria-label="{% trans 'Similar news' %}" title="{% trans 'Similar news' %}"><i class="fas fa-circle-nodes"></i></button>
    <a href="{% url 'research' item.id %}" class="research-hint research-link" data-item-id="{{ item.id }}">{% trans "research" %} &rarr;</a>
</span>
