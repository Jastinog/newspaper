{% load news_extras markdown_extras i18n static %}
{% with img_url=item.best_image_url|default_if_none:"" item_url=item.article_url %}
<div class="item-hero-card">
    <div class="item-top-bar">
        <button class="share-btn" data-url="{{ item_url }}" data-title="{{ item.loc_topic }}" aria-label="{% trans 'Share' %}" title="{% trans 'Share' %}"><i class="fas fa-share-nodes"></i></button>
    </div>
    <a href="{{ item_url }}"><img class="item-hero-card__img" src="{% if img_url %}{{ img_url }}{% else %}{% static 'news/img/placeholder.webp' %}{% endif %}" alt="" loading="lazy" onload="this.classList.add('loaded')"></a>
</div>
<a href="{{ item_url }}" class="item-topic">{{ item.loc_topic }}</a>
<div class="item-summary">{{ item.loc_summary|markdown }}</div>
{% endwith %}
