{% load i18n %}{% if item.importance >= 7 %}<span class="importance-bar critical" data-label="{% trans 'Breaking news' %}"></span>
{% elif item.importance >= 6 %}<span class="importance-bar high" data-label="{% trans 'Important' %}"></span>
{% elif item.importance >= 4 %}<span class="importance-bar medium" data-label="{% trans 'Worth noting' %}"></span>
{% else %}<span class="importance-bar low" data-label="{% trans 'For context' %}"></span>
{% endif %}
