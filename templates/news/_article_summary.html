{% load i18n %}
<div id="articleSummary" class="ai-summary{% if not summary %} ai-summary--prompt{% endif %}">
{% if summary %}
    <div class="ai-summary-head">
        <span class="ai-summary-badge">AI</span>
        <span class="ai-summary-title">{% trans "Summary" %}</span>
    </div>
    <div class="ai-summary-body">{{ summary.summary|linebreaks }}</div>
    {% if summary.conclusion %}
    <div class="ai-summary-conclusion">
        <span class="ai-summary-sub">{% trans "Takeaway" %}</span>
        <p>{{ summary.conclusion }}</p>
    </div>
    {% endif %}
{% elif summary_error %}
    <div class="ai-summary-error">
        <p>{% trans "Couldn't generate the summary:" %} {{ summary_error }}</p>
        <button class="ai-summary-btn"
                hx-post="{% url 'article_summarize' article.pk %}"
                hx-target="#articleSummary" hx-swap="outerHTML"
                hx-trigger="click once" hx-disabled-elt="this">
            {% trans "Retry" %}
        </button>
    </div>
{% else %}
    <button class="ai-summary-btn"
            hx-post="{% url 'article_summarize' article.pk %}"
            hx-target="#articleSummary" hx-swap="outerHTML"
            hx-trigger="click once" hx-disabled-elt="this"
            hx-indicator="#aiSummarySpin">
        <span class="ai-summary-btn-icon">✦</span>
        <span>{% trans "Get the summary" %}</span>
        <span id="aiSummarySpin" class="ai-summary-spin htmx-indicator">{% trans "generating…" %}</span>
    </button>
{% endif %}
</div>
