    {% include "news/_seo_head.html" %}

</head>
<body>
    <header>
        <h1><a href="{% url 'index' %}">{% trans "Newspaper" %}</a></h1>
        <nav>
            <a href="{% url 'index' %}">{% trans "Digest" %}</a>
