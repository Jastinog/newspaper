{% load i18n %}
{% for article in page %}
    {% include "news/_home_item.html" %}
{% empty %}
{% if page.number == 1 %}
<div class="home-empty">
    <p>{% trans "No news yet." %}</p>
</div>
{% endif %}
{% endfor %}
{% if page.has_next %}
<div class="home-more"
     hx-get="?page={{ page.next_page_number }}"
     hx-trigger="revealed"
     hx-swap="outerHTML"
     hx-target="this">
    <span class="home-more-dot"></span>
    <span class="home-more-dot"></span>
    <span class="home-more-dot"></span>
</div>
{% endif %}
