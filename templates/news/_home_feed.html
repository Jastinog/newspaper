{% load i18n %}
{% for article in articles %}
    {% include "news/_home_item.html" %}
{% empty %}
{% if is_first %}
<div class="home-empty">
    <p>{% trans "No news yet." %}</p>
</div>
{% endif %}
{% endfor %}
{% if next_cursor %}
<div class="home-more"
     hx-get="?cursor={{ next_cursor|urlencode }}"
     hx-trigger="intersect once root-margin:800px"
     hx-swap="outerHTML"
     hx-target="this">
    <span class="home-more-dot"></span>
    <span class="home-more-dot"></span>
    <span class="home-more-dot"></span>
</div>
{% endif %}
