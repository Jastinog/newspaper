{% load i18n %}
<div class="digest-section{% if is_pinned %} pinned{% endif %}" data-section-slug="{{ group.section.slug }}">
    <h3><button class="pin-section-btn"
                data-section-slug="{{ group.section.slug }}"
                data-pin-url="{% url 'toggle_pin' group.section.slug %}"
                title="{% if is_pinned %}{% trans 'Unpin section' %}{% else %}{% trans 'Pin section' %}{% endif %}"><i class="fas fa-thumbtack"></i></button><a href="{{ group.section.get_absolute_url }}" class="section-title-link">{{ group.name }}</a> <a href="{{ group.section.get_absolute_url }}" class="section-more">{% trans "All" %} &rsaquo;</a></h3>
    <div class="summary">
        <ul>
        {% for article in group.items %}
            <li>{% include "news/_home_item.html" %}</li>
        {% endfor %}
        </ul>
    </div>
</div>
