{% extends "unfold/layouts/base_simple.html" %}
{% load i18n unfold static %}

{% block title %}Analytics{% endblock %}
{% block content_title %}Analytics{% endblock %}

{% block content %}
<div class="space-y-4">

{# Date picker + status #}
<div class="flex items-center justify-between">
    <input type="date" id="timeline-date"
           class="bg-base-100 dark:bg-white/[.06] border border-base-200 dark:border-white/10 rounded-default px-3 py-1.5 text-sm text-important"
           value="">
    <div class="flex items-center gap-2">
        <span id="ad-status" class="text-xs text-gray-400"></span>
        <span id="ad-dot" class="inline-block w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
    </div>
</div>

{# Timeline chart #}
<div class="bg-white dark:bg-base-700 rounded-default shadow-xs p-4" style="min-height:300px;">
    <canvas id="timeline-chart"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
(function() {
    'use strict';

    var API_URL = '{% url "analytics_timeline_api" %}';
    var REFRESH_INTERVAL = 30000;
    var chart = null;
    var refreshTimer = null;

    // ── Color palette for sessions ─────────────────
    var PALETTE = [
        { bg: 'rgba(99, 102, 241, 0.7)',  border: 'rgb(99, 102, 241)' },
        { bg: 'rgba(34, 197, 94, 0.7)',   border: 'rgb(34, 197, 94)' },
        { bg: 'rgba(234, 179, 8, 0.7)',   border: 'rgb(234, 179, 8)' },
        { bg: 'rgba(236, 72, 153, 0.7)',  border: 'rgb(236, 72, 153)' },
        { bg: 'rgba(6, 182, 212, 0.7)',   border: 'rgb(6, 182, 212)' },
        { bg: 'rgba(168, 85, 247, 0.7)',  border: 'rgb(168, 85, 247)' },
        { bg: 'rgba(251, 146, 60, 0.7)',  border: 'rgb(251, 146, 60)' },
        { bg: 'rgba(59, 130, 246, 0.7)',  border: 'rgb(59, 130, 246)' },
    ];

    // ── Date picker ────────────────────────────────
    var dateInput = document.getElementById('timeline-date');
    dateInput.addEventListener('change', function() { fetchAndRender(); });

    // ── Build datasets from API data ───────────────
    function buildDatasets(clients) {
        var maxSessions = 0;
        clients.forEach(function(c) {
            if (c.sessions.length > maxSessions) maxSessions = c.sessions.length;
        });

        var datasets = [];
        for (var si = 0; si < maxSessions; si++) {
            var barData = [];
            var bgColors = [];
            var borderColors = [];
            var sessionMeta = [];

            clients.forEach(function(c, ci) {
                var s = c.sessions[si];
                if (s) {
                    barData.push([s.start, s.end]);
                    var color = PALETTE[ci % PALETTE.length];
                    bgColors.push(color.bg);
                    borderColors.push(color.border);
                    sessionMeta.push(s);
                } else {
                    barData.push(null);
                    bgColors.push('transparent');
                    borderColors.push('transparent');
                    sessionMeta.push(null);
                }
            });

            datasets.push({
                data: barData,
                backgroundColor: bgColors,
                borderColor: borderColors,
                borderWidth: 1,
                borderSkipped: false,
                barPercentage: 0.6,
                categoryPercentage: 0.8,
                _sessionMeta: sessionMeta,
            });
        }
        return datasets;
    }

    // ── Chart config (created once) ────────────────
    var chartConfig = {
        type: 'bar',
        data: { labels: [], datasets: [] },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 300 },
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        title: function(items) {
                            return items.length ? items[0].label : '';
                        },
                        label: function(item) {
                            var meta = item.dataset._sessionMeta
                                ? item.dataset._sessionMeta[item.dataIndex]
                                : null;
                            if (!meta) return '';

                            var lines = [];
                            lines.push(formatTime(meta.start) + ' — ' + formatTime(meta.end));
                            lines.push('Duration: ' + meta.duration);
                            lines.push('SPM: ' + meta.spm + ' | Scrolls: ' + meta.scrolls);

                            if (meta.pages && meta.pages.length) {
                                lines.push('Pages:');
                                meta.pages.forEach(function(p) {
                                    var path = typeof p === 'object' ? p.path : p;
                                    var ts = typeof p === 'object' ? p.ts : '';
                                    lines.push('  ' + (ts ? ts + ' ' : '') + path);
                                });
                            }
                            return lines;
                        }
                    }
                }
            },
            scales: {
                x: {
                    min: 0, max: 24,
                    ticks: {
                        stepSize: 1,
                        callback: function(val) { return val + ':00'; }
                    },
                    grid: { color: 'rgba(156, 163, 175, 0.15)' }
                },
                y: {
                    ticks: { font: { size: 11 } },
                    grid: { display: false }
                }
            }
        }
    };

    function formatTime(h) {
        var hours = Math.floor(h);
        var minutes = Math.round((h - hours) * 60);
        return String(hours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0');
    }

    // ── Update chart with new data ─────────────────
    function updateChart(data) {
        var clients = data.clients || [];
        var labels = clients.map(function(c) { return c.label; });
        var datasets = buildDatasets(clients);

        var canvas = document.getElementById('timeline-chart');
        var rowHeight = 36;
        canvas.parentElement.style.minHeight = Math.max(200, clients.length * rowHeight + 60) + 'px';

        if (!chart) {
            chart = new Chart(canvas.getContext('2d'), chartConfig);
        }

        chart.data.labels = labels;
        chart.data.datasets = datasets;
        chart.update();
    }

    // ── Fetch and render ───────────────────────────
    function fetchAndRender() {
        var url = API_URL + '?date=' + dateInput.value;
        var dot = document.getElementById('ad-dot');
        var status = document.getElementById('ad-status');

        fetch(url, { credentials: 'same-origin' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                // Use server date on first load
                if (!dateInput.value && data.date) {
                    dateInput.value = data.date;
                }
                updateChart(data);
                dot.style.backgroundColor = '#22c55e';
                var count = (data.clients || []).length;
                status.textContent = count + ' client' + (count !== 1 ? 's' : '');
            })
            .catch(function() {
                dot.style.backgroundColor = '#ef4444';
                status.textContent = 'Error';
            });
    }

    // ── Auto-refresh with visibility awareness ─────
    function startRefresh() {
        stopRefresh();
        refreshTimer = setInterval(fetchAndRender, REFRESH_INTERVAL);
    }

    function stopRefresh() {
        if (refreshTimer) {
            clearInterval(refreshTimer);
            refreshTimer = null;
        }
    }

    document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
            stopRefresh();
        } else {
            fetchAndRender();
            startRefresh();
        }
    });

    // ── Initial load ───────────────────────────────
    fetchAndRender();
    startRefresh();
})();
</script>
{% endblock %}
