{% extends "unfold/layouts/base_simple.html" %}
{% load i18n unfold static %}

{% block title %}Analytics{% endblock %}
{% block content_title %}Analytics{% endblock %}

{% block content %}
<div class="space-y-4">

{# Status #}
<div class="flex items-center justify-between">
    <span class="text-sm text-gray-400">Last 24 hours</span>
    <div class="flex items-center gap-2">
        <span id="ad-status" class="text-xs text-gray-400"></span>
        <span id="ad-dot" class="inline-block w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
    </div>
</div>

{# Timeline chart #}
<div id="chart-wrap" class="rounded-default shadow-xs p-4" style="min-height:300px; background:#1e1e2e;">
    <canvas id="timeline-chart"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
(function() {
    'use strict';

    var API_URL = '{% url "analytics_timeline_api" %}';
    var REFRESH_INTERVAL = 30000;
    var chart = null;
    var refreshTimer = null;

    // ── Dark color palette ─────────────────────────
    var PALETTE = [
        { bg: 'rgba(129, 140, 248, 0.6)', border: 'rgb(129, 140, 248)' },
        { bg: 'rgba(52, 211, 153, 0.6)',  border: 'rgb(52, 211, 153)' },
        { bg: 'rgba(251, 191, 36, 0.6)',  border: 'rgb(251, 191, 36)' },
        { bg: 'rgba(244, 114, 182, 0.6)', border: 'rgb(244, 114, 182)' },
        { bg: 'rgba(34, 211, 238, 0.6)',  border: 'rgb(34, 211, 238)' },
        { bg: 'rgba(192, 132, 252, 0.6)', border: 'rgb(192, 132, 252)' },
        { bg: 'rgba(251, 146, 60, 0.6)',  border: 'rgb(251, 146, 60)' },
        { bg: 'rgba(96, 165, 250, 0.6)',  border: 'rgb(96, 165, 250)' },
    ];

    // ── Build datasets from API data ───────────────
    function buildDatasets(clients) {
        var maxSessions = 0;
        clients.forEach(function(c) {
            if (c.sessions.length > maxSessions) maxSessions = c.sessions.length;
        });

        var datasets = [];
        for (var si = 0; si < maxSessions; si++) {
            var barData = [];
            var bgColors = [];
            var borderColors = [];
            var sessionMeta = [];

            clients.forEach(function(c, ci) {
                var s = c.sessions[si];
                if (s) {
                    barData.push([s.start, s.end]);
                    var color = PALETTE[ci % PALETTE.length];
                    bgColors.push(color.bg);
                    borderColors.push(color.border);
                    sessionMeta.push(s);
                } else {
                    barData.push(null);
                    bgColors.push('transparent');
                    borderColors.push('transparent');
                    sessionMeta.push(null);
                }
            });

            datasets.push({
                data: barData,
                backgroundColor: bgColors,
                borderColor: borderColors,
                borderWidth: 1,
                borderSkipped: false,
                barPercentage: 0.6,
                categoryPercentage: 0.8,
                _sessionMeta: sessionMeta,
            });
        }
        return datasets;
    }

    // ── Chart config (dark theme) ──────────────────
    var chartConfig = {
        type: 'bar',
        data: { labels: [], datasets: [] },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 300 },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(30, 30, 46, 0.95)',
                    titleColor: '#cdd6f4',
                    bodyColor: '#a6adc8',
                    borderColor: 'rgba(255,255,255,0.1)',
                    borderWidth: 1,
                    padding: 10,
                    callbacks: {
                        title: function(items) {
                            return items.length ? items[0].label : '';
                        },
                        label: function(item) {
                            var meta = item.dataset._sessionMeta
                                ? item.dataset._sessionMeta[item.dataIndex]
                                : null;
                            if (!meta) return '';

                            var lines = [];
                            lines.push('Duration: ' + meta.duration);
                            lines.push('SPM: ' + meta.spm + ' | Scrolls: ' + meta.scrolls);

                            if (meta.pages && meta.pages.length) {
                                lines.push('Pages:');
                                meta.pages.forEach(function(p) {
                                    var path = typeof p === 'object' ? p.path : p;
                                    var ts = typeof p === 'object' ? p.ts : '';
                                    lines.push('  ' + (ts ? ts + ' ' : '') + path);
                                });
                            }
                            return lines;
                        }
                    }
                }
            },
            scales: {
                x: {
                    min: 0, max: 24,
                    ticks: {
                        stepSize: 1,
                        color: '#6c7086',
                        font: { size: 10 },
                        callback: function() { return ''; }
                    },
                    grid: { color: 'rgba(108, 112, 134, 0.15)' },
                    border: { color: 'rgba(108, 112, 134, 0.2)' }
                },
                y: {
                    ticks: {
                        color: '#a6adc8',
                        font: { size: 11 },
                    },
                    grid: { display: false },
                    border: { display: false }
                }
            }
        }
    };

    // ── Second X axis for hour labels ──────────────
    var hourLabels = [];

    function updateHourLabels(labels) {
        hourLabels = labels || [];
        if (chart) {
            chart.options.scales.x.ticks.callback = function(val) {
                var idx = Math.round(val);
                return (idx >= 0 && idx < hourLabels.length) ? hourLabels[idx] : '';
            };
        }
    }

    // ── Update chart with new data ─────────────────
    function updateChart(data) {
        var clients = data.clients || [];
        var labels = clients.map(function(c) { return c.label; });
        var datasets = buildDatasets(clients);

        var canvas = document.getElementById('timeline-chart');
        var rowHeight = 36;
        canvas.parentElement.style.minHeight = Math.max(200, clients.length * rowHeight + 60) + 'px';

        if (!chart) {
            chart = new Chart(canvas.getContext('2d'), chartConfig);
        }

        updateHourLabels(data.hour_labels);

        chart.data.labels = labels;
        chart.data.datasets = datasets;
        chart.update();
    }

    // ── Fetch and render ───────────────────────────
    function fetchAndRender() {
        var dot = document.getElementById('ad-dot');
        var status = document.getElementById('ad-status');

        fetch(API_URL, { credentials: 'same-origin' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                updateChart(data);
                dot.style.backgroundColor = '#22c55e';
                var count = (data.clients || []).length;
                status.textContent = count + ' client' + (count !== 1 ? 's' : '');
            })
            .catch(function() {
                dot.style.backgroundColor = '#ef4444';
                status.textContent = 'Error';
            });
    }

    // ── Auto-refresh with visibility awareness ─────
    function startRefresh() {
        stopRefresh();
        refreshTimer = setInterval(fetchAndRender, REFRESH_INTERVAL);
    }

    function stopRefresh() {
        if (refreshTimer) {
            clearInterval(refreshTimer);
            refreshTimer = null;
        }
    }

    document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
            stopRefresh();
        } else {
            fetchAndRender();
            startRefresh();
        }
    });

    // ── Initial load ───────────────────────────────
    fetchAndRender();
    startRefresh();
})();
</script>
{% endblock %}
