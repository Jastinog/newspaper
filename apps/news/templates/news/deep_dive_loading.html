{% extends "news/base.html" %}
{% load static i18n %}

{% block extra_css %}
<style>
    .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        text-align: center;
    }

    .loading-topic {
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 2rem;
        line-height: 1.35;
    }

    .loading-label {
        font-family: -apple-system, system-ui, "Helvetica Neue", sans-serif;
        font-size: 0.85rem;
        color: var(--fg-muted);
        letter-spacing: 0.05em;
        margin-top: 1.5rem;
    }

    .loading-error {
        display: none;
        color: var(--fg-muted);
        font-size: 0.9rem;
        margin-top: 1rem;
    }

    .loading-error a { color: var(--link); }
</style>
{% endblock %}

{% block content %}
<div class="loading-container">
    <div class="loading-topic">{{ item.topic }}</div>
    <div id="loadingOverlay" class="active" style="position:static;background:none;backdrop-filter:none;display:flex">
        <canvas id="orbitCanvas"></canvas>
    </div>
    <div class="loading-label" id="loadingLabel">{% trans "Gathering information from sources..." %}</div>
    <div class="loading-error" id="loadingError">
        {% trans "Generation error." %} <a href="{% url 'index' %}">{% trans "Back to digest" %}</a>
    </div>
</div>

<script src="{% static 'news/js/orbit-animation.js' %}"></script>
<script src="{% static 'news/js/ws.js' %}"></script>
<script>
(function () {
    var itemId = {{ item.id }};

    WS.on('init', function () {
        WS.send('deep_dive.generate', { item_id: itemId });
    });

    WS.on('deep_dive.ready', function (msg) {
        if (msg.item_id === itemId) window.location.href = msg.url;
    });

    WS.on('deep_dive.error', function (msg) {
        if (msg.item_id === itemId) {
            document.getElementById('loadingLabel').style.display = 'none';
            document.getElementById('loadingError').style.display = 'block';
        }
    });
})();
</script>
{% endblock %}
