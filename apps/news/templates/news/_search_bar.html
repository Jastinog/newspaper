{% load i18n %}
<form class="search-bar" action="{% url 'search' %}" method="get">
    <input type="text" name="q" class="search-bar-input" placeholder="{% trans "Search news..." %}" value="{{ query|default:'' }}" autocomplete="off" {% if autofocus %}autofocus{% endif %}>
    <button type="submit" class="search-bar-btn" aria-label="{% trans "Search" %}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
</form>
